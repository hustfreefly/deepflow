# Fix Path Issue Contract (Absolute Path)
# 版本: 2026-04-26-v5
# 目标: 修复子 Agent 文件路径问题（使用绝对路径）

task: "fix_path_absolute"
domain: solution

# =============================================================================
# 问题定义
# =============================================================================
problem:
  description: "子 Agent 使用相对路径 'blackboard/...' 写入文件，实际写入到 workspace 根目录的 'Blackboard/' 而非 '.deepflow/blackboard/'"
  root_cause: "子 Agent 工作目录是 workspace 根目录，相对路径 'blackboard/' 被解析为 workspace/blackboard/ 而非 workspace/.deepflow/blackboard/"
  impact: "所有文件写入位置错误，主 Agent 无法读取"

# =============================================================================
# 修复方案
# =============================================================================
fix_strategy: "将所有 task prompt 中的相对路径 'blackboard/...' 改为绝对路径 '/Users/allen/.openclaw/workspace/.deepflow/blackboard/...'"

changes:
  - file: "domains/solution/task_builder.py"
    scope: "所有 build_*_task 方法中的路径字符串"
    rule: "使用绝对路径，格式: /Users/allen/.openclaw/workspace/.deepflow/blackboard/{session_id}/..."
    count: 24 处

# =============================================================================
# 验证要求
# =============================================================================
validation:
  - "task_builder.py 中所有 'blackboard/' 出现处均为绝对路径"
  - "验证脚本 grep 计数: 相对路径计数 = 0"
  - "验证脚本 grep 计数: 绝对路径计数 >= 24"
  - "validate_refactor.py 仍然通过"
