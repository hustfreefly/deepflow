# [模块名] 契约文件模板
# 复制此文件到 cage/[module].yaml 并填写
# 
# ⚠️ YAML 格式注意：
# - interface 必须是 dict 格式（key: value），不能是列表
# - 方法签名用引号包裹，避免 YAML 解析错误
# - 预估大小：方法数 × 150 字符，>1500 建议设 complexity: medium

module: "[模块名，如 config_loader]"
version: "1.0"
complexity: "simple"  # simple/medium/complex（决定大小限制）
                      # simple: ≤10 方法，约 200 行代码
                      # medium: 10-20 方法，约 350 行代码
                      # complex: >20 方法，约 500 行代码

# =============================================================================
# L1: 接口契约（方法签名）
# =============================================================================
# 格式："method_name": "param1: type, param2: type -> ReturnType"
# 注意：必须用引号包裹方法名，签名中的冒号不会导致 YAML 解析错误

interface:
  "[method_1]": "param1: str, param2: int -> str"
  "[method_2]": "data: dict -> None"
  "[method_3]": "() -> List[str]"

# =============================================================================
# L2: 行为契约（输入/输出/成功/失败）
# =============================================================================
# 必须与 interface 中的方法名完全一致（不含引号）

behavior:
  [method_1]:
    input:
      param1: "类型 + 约束（如：必填，str，不能为空）"
      param2: "类型 + 约束（如：必填，int，必须 > 0）"
    output:
      type: "返回类型"
      constraints:
        - "约束条件 1"
        - "约束条件 2"
    success: "成功时的具体行为（如：返回处理后的字符串）"
    failure: "失败时的具体行为（如：抛出 ValueError）"

  [method_2]:
    input:
      data: "类型 + 约束"
    output:
      type: "返回类型（如 None 表示无返回值）"
      constraints: []
    success: "成功时的行为"
    failure: "失败时的行为"

  [method_3]:
    input: {}  # 无输入参数
    output:
      type: "List[str]"
      constraints:
        - "列表不为 None（空列表允许）"
    success: "成功时的行为"
    failure: "失败时的行为"

# =============================================================================
# L3: 边界条件（至少 1 条）
# =============================================================================

boundaries:
  - "[边界条件 1：如 参数为空 → ValueError]"
  - "[边界条件 2：如 文件不存在 → FileNotFoundError]"
  - "[边界条件 3：如 超时 → TimeoutError]"

# =============================================================================
# 可选：依赖关系
# =============================================================================

dependencies:
  - "[module.method]"

# =============================================================================
# 可选：使用示例
# =============================================================================

examples:
  [method_1]: |
    # 代码示例
    result = obj.method_1("hello", 42)
    assert result == "expected"
