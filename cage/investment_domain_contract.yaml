# Investment 领域路径替换契约
# 版本: 2026-04-27-v1
# 目标: 替换 domains/investment/ 下所有 Python 文件的硬编码路径

contract:
  name: "Investment Domain Path Replacement"
  version: "2026-04-27-v1"
  target_files:
    - "domains/investment/__init__.py"
    - "domains/investment/orchestrator.py"
    - "domains/investment/cage_orchestrator.py"
  
  requirements:
    - id: "IMPORT"
      description: "所有文件导入 PathConfig"
      validation: "grep -l 'from core.config.path_config import PathConfig' domains/investment/*.py"
      
    - id: "NO_HARDCODE"
      description: "无硬编码用户路径"
      validation: "grep -c '/Users/allen/' domains/investment/*.py | grep ':0$'"
      
    - id: "SYSPATH_INIT"
      description: "__init__.py sys.path 使用 PathConfig"
      validation: "grep 'sys.path.insert.*PathConfig' domains/investment/__init__.py"
      
    - id: "SYSPATH_ORCH"
      description: "orchestrator.py sys.path 使用 PathConfig"
      validation: "grep 'sys.path.insert.*PathConfig' domains/investment/orchestrator.py"
      
    - id: "SYSPATH_CAGE"
      description: "cage_orchestrator.py sys.path 使用 PathConfig"
      validation: "grep 'sys.path.insert.*PathConfig' domains/investment/cage_orchestrator.py"
      
    - id: "DATASOURCE"
      description: "data_sources 路径使用 PathConfig"
      validation: "grep 'data_sources.*PathConfig' domains/investment/*.py"
      
    - id: "BLACKBOARD"
      description: "blackboard 路径使用 PathConfig"
      validation: "grep 'get_blackboard_path' domains/investment/*.py"
      
    - id: "PROMPTS"
      description: "prompts 路径使用 PathConfig"
      validation: "grep 'prompts_dir' domains/investment/*.py"

  test_requirements:
    - id: "TEST_IMPORT"
      description: "可以导入 investment 模块"
      validation: "python3 -c 'from domains.investment.orchestrator import InvestmentOrchestrator; print(\"OK\")'"

  success_criteria:
    - "domains/investment/ 下所有 .py 文件无 /Users/allen/ 硬编码路径"
    - "所有路径通过 PathConfig 生成"
    - "导入测试通过"
