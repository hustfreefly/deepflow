module: investment_summarizer
version: "2.0"
complexity: "medium"

# =============================================================================
# 启动协议
# =============================================================================

launch_protocol:
  correct_flow: |
    OrchestratorAgent 通过 sessions_spawn 启动 Summarizer Worker
    Summarizer 读取 Blackboard 中所有 Worker 输出
    生成最终投资分析报告并写入 Blackboard

# =============================================================================
# L1: 接口契约
# =============================================================================

interface:
  "SummarizerAgent.__init__": "session_id: str -> None"
  "SummarizerAgent.log": "msg: str -> None"
  "SummarizerAgent.read_worker_outputs": "() -> Dict[str, Any]"
  "SummarizerAgent.extract_core_conflict": "() -> Dict[str, Any]"
  "SummarizerAgent.build_investment_thesis": "() -> Dict[str, Any]"
  "SummarizerAgent.validate_thesis": "() -> Dict[str, Any]"
  "SummarizerAgent.generate_report": "() -> str"
  "SummarizerAgent.write_output": "report: str -> None"
  "SummarizerAgent.run": "() -> None"

# =============================================================================
# L2: 行为契约
# =============================================================================

behavior:
  SummarizerAgent.__init__:
    input:
      session_id: "str，Blackboard session ID"
    output:
      type: "None"
      constraints: []
    success: "初始化 logger，设置 session_id"
    failure: "无（构造函数不失败）"

  SummarizerAgent.log:
    input:
      msg: "str，日志消息"
    output:
      type: "None"
      constraints: []
    success: "打印格式: [Summarizer] {msg}"
    failure: "无"

  SummarizerAgent.read_worker_outputs:
    input: {}
    output:
      type: "Dict[str, Any]"
      constraints:
        - "必须包含所有 Worker 输出"
        - "按优先级分层：第一层 > 第二层 > 第三层"
    success: |
      按优先级读取文件：
      第一层（必须读）：auditor_factual, researcher_finance, researcher_macro_chain
      第二层（辅助）：researcher_tech, researcher_market, fixer
      第三层（参考）：management, sentiment, auditor_upside, auditor_downside
    failure: "文件不存在 → 跳过该 Worker，记录警告"

  SummarizerAgent.extract_core_conflict:
    input: {}
    output:
      type: "Dict[str, Any]"
      constraints:
        - "必须包含最大矛盾点"
        - "必须包含关键数据分歧"
    success: |
      1. 识别长期利好 vs 短期风险
      2. 找出数据矛盾（如市占率不一致）
      3. 标注矛盾来源和置信度
    failure: "无矛盾 → 标注'无显著矛盾'"

  SummarizerAgent.build_investment_thesis:
    input: {}
    output:
      type: "Dict[str, Any]"
      constraints:
        - "必须包含1-2条核心投资逻辑"
        - "每条逻辑必须有数据来源和置信度"
    success: |
      提炼核心逻辑：
      - 长期逻辑（如国产替代）
      - 短期风险（如利润率下滑）
      - 关键拐点（何时从观望变买入）
      - 投资建议（买入/持有/卖出 + 目标价）
    failure: "数据不足 → 标注'无法给出明确建议'"

  SummarizerAgent.validate_thesis:
    input: {}
    output:
      type: "Dict[str, Any]"
      constraints:
        - "验证逻辑链是否自洽"
        - "处理数据矛盾"
    success: |
      1. 用第二层 Worker 验证核心逻辑
      2. 按优先级处理矛盾：Auditor > Finance > Market
      3. 诚实披露无法验证的点
    failure: "验证失败 → 降低置信度或标注不确定性"

  SummarizerAgent.generate_report:
    input: {}
    output:
      type: "str"
      constraints:
        - "Markdown 格式"
        - "必须以'核心投资逻辑'开头"
        - "必须包含情景分析表格"
    success: |
      生成完整报告：
      1. 核心投资逻辑（3-5条 bullet points）
      2. 公司概况
      3. 财务分析
      4. 情景分析（乐观/中性/悲观）
      5. 风险评估
      6. 数据缺口
    failure: "数据不足 → 生成简化报告，标注局限性"

  SummarizerAgent.write_output:
    input:
      report: "str，Markdown 格式报告"
    output:
      type: "None"
      constraints: []
    success: |
      写入两个文件：
      1. stages/summarizer_output.json（结构化数据）
      2. workers/final_report.md（Markdown 报告）
    failure: "目录不存在 → 创建目录后重试"

  SummarizerAgent.run:
    input: {}
    output:
      type: "None"
      constraints: []
    success: "按顺序执行：read → extract → build → validate → generate → write"
    failure: "任何步骤异常 → 记录错误，尝试生成简化报告"

# =============================================================================
# L3: 边界条件
# =============================================================================

boundaries:
  - "Worker 输出缺失 → 跳过该 Worker，记录警告"
  - "数据矛盾无法调和 → 诚实披露，标注倾向及原因"
  - "置信度 < 0.70 → 不能给出明确投资建议"
  - "所有 Worker 输出缺失 → 生成错误报告，说明原因"
  - "文件写入失败 → 重试一次，仍失败则记录错误"

# =============================================================================
# 依赖关系
# =============================================================================

dependencies:
  - "blackboard_manager.BlackboardManager"
  - "pipeline_engine.PipelineResult"

# =============================================================================
# 分析框架（v2.0 新增）
# =============================================================================

analysis_framework:
  version: "2.0"
  approach: "论点驱动（Thesis-Driven）"
  
  reading_priority:
    layer1:
      files: ["auditor_factual_output", "researcher_finance", "researcher_macro_chain"]
      time_allocation: "50%"
      purpose: "提取核心矛盾"
    layer2:
      files: ["researcher_tech", "researcher_market", "fixer_output"]
      time_allocation: "30%"
      purpose: "验证支撑论据"
    layer3:
      files: ["researcher_management", "researcher_sentiment", "auditor_upside", "auditor_downside"]
      time_allocation: "20%"
      purpose: "补充参考"

  conflict_resolution:
    rules:
      - "Auditor 验证过的数据 > 未验证的推测"
      - "有具体数据来源（如 Tushare）> 泛泛而谈"
      - "Confidence ≥ 0.85 > Confidence < 0.85"
      - "Finance 数据 > Market 推测（财务更硬）"
    disclosure: "必须在报告中诚实标注数据分歧及处理依据"

  output_structure:
    required_sections:
      - "核心投资逻辑（3-5条 bullet points）"
      - "公司概况"
      - "财务分析"
      - "情景分析（乐观/中性/悲观 + 概率）"
      - "风险评估"
      - "数据缺口与局限性"
    forbidden:
      - "平均用力，没有主次之分"
      - "回避矛盾，不处理、不披露"
      - "过度乐观，忽视 auditor 的 P0/P1 问题"
      - "没有观点，只罗列事实"
      - "臆造数据，没有 Worker 支撑"
