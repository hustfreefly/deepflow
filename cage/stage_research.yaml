# Stage Contract - Research
stage: research
domain: investment
cage_version: "2.0"

# 接口契约
interface:
  input:
    context:
      required: [code, name]
  
  output:
    schema:
      type: object
      required: [success, research_outputs, conclusions]
      properties:
        success: {type: boolean}
        research_outputs:
          type: array
          items:
            type: object
            properties:
              role: {type: string}
              analysis: {type: string}
              confidence: {type: number, minimum: 0, maximum: 1}
        conclusions:
          type: array
          items: {type: string}
        data_sources:
          type: array
          items: {type: string}

# 行为契约
behavior:
  timeout: 300
  retry:
    max_attempts: 2
  failure_mode: "warn_and_continue"

# 数据契约
data:
  output_path: "blackboard/{session_id}/stages/research/"
