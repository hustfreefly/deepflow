# Task Builder 路径替换契约
# 版本: 2026-04-27-v1
# 目标: 将 domains/solution/task_builder.py 中的硬编码路径替换为 PathConfig

contract:
  name: "Task Builder Path Replacement"
  version: "2026-04-27-v1"
  target_file: "domains/solution/task_builder.py"
  
  requirements:
    - id: "IMPORT"
      description: "导入 PathConfig"
      validation: "grep 'from core.config.path_config import PathConfig' domains/solution/task_builder.py"
      
    - id: "NO_HARDCODE"
      description: "无硬编码用户路径"
      validation: "grep -c '/Users/allen/' domains/solution/task_builder.py | grep '^0$'"
      
    - id: "USE_PATHCONFIG"
      description: "使用 PathConfig 获取 blackboard 路径"
      validation: "grep 'config.get_blackboard_path' domains/solution/task_builder.py"
      
    - id: "BUILD_TASKS"
      description: "build_tasks 方法使用 PathConfig"
      validation: "grep 'PathConfig.resolve' domains/solution/task_builder.py"
      
    - id: "ALL_METHODS"
      description: "所有 build_*_task 方法使用绝对路径"
      validation: "grep -c 'blackboard/' domains/solution/task_builder.py | grep '^0$'"

  test_requirements:
    - id: "TEST_IMPORT"
      description: "可以导入 task_builder"
      validation: "python3 -c 'from domains.solution.task_builder import SolutionTaskBuilder; print(\"OK\")'"

  success_criteria:
    - "domains/solution/task_builder.py 无 /Users/allen/ 硬编码路径"
    - "所有路径通过 PathConfig 生成"
    - "导入测试通过"
