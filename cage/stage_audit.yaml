# Stage Contract - Audit
stage: audit
domain: investment
cage_version: "2.0"

# 接口契约
interface:
  input:
    context:
      required: [code, name]
  
  output:
    schema:
      type: object
      required: [success, audit_findings, issues]
      properties:
        success: {type: boolean}
        audit_findings:
          type: array
          items:
            type: object
            properties:
              category: {type: string}
              severity: {type: string, enum: [P0, P1, P2, P3]}
              description: {type: string}
        issues:
          type: array
          items: {type: string}
        issue_count:
          type: integer
          minimum: 0

# 行为契约
behavior:
  timeout: 120
  retry:
    max_attempts: 2
  failure_mode: "warn_and_continue"

# 数据契约
data:
  output_path: "blackboard/{session_id}/stages/audit/"
