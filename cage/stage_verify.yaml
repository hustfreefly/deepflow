# Stage Contract - Verify
stage: verify
domain: investment
cage_version: "2.0"

# 接口契约
interface:
  input:
    context:
      required: [code, name]
  
  output:
    schema:
      type: object
      required: [success, verification_results, passed]
      properties:
        success: {type: boolean}
        verification_results:
          type: array
          items:
            type: object
            properties:
              check_name: {type: string}
              passed: {type: boolean}
              details: {type: string}
        passed: {type: boolean}
        failed_checks:
          type: array
          items: {type: string}

# 行为契约
behavior:
  timeout: 120
  retry:
    max_attempts: 2
  failure_mode: "warn_and_continue"

# 数据契约
data:
  output_path: "blackboard/{session_id}/stages/verify/"
