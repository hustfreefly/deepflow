# Fix P0 + P1 Issues Contract
# 版本: 2026-04-26-v2
# 目标: 修复 Research 文件名冲突、占位符、Data Collection 工具、Deliver Prompt、Designer 输入依赖

task: "fix_p0_p1_issues"
domain: solution

# =============================================================================
# P0 Issues
# =============================================================================
p0_issues:
  - id: "P0-001"
    name: "Research 文件名冲突"
    location: "task_builder.py:build_researcher_task"
    problem: "输出路径使用 research_{{expert}}.json，占位符未替换，3 个 expert 写入同一文件"
    fix: "改为 research_expert_{index}.json，如 research_expert_1.json"
    
  - id: "P0-002"
    name: "Research 占位符未替换"
    location: "orchestrator_agent.py + task_builder.py"
    problem: "{{ expert.angle }} 和 {{ expert.reason }} 未提供值，专家角色模糊"
    fix: "在 planning 阶段输出 required_experts 数组，包含 name/angle/reason，task_builder 使用这些值"

# =============================================================================
# P1 Issues
# =============================================================================
p1_issues:
  - id: "P1-001"
    name: "Data Collection 缺乏搜索工具"
    location: "task_builder.py:build_data_collection_task"
    problem: "Agent 只有 web_fetch，无搜索引擎，无法获取最新数据"
    fix: "提供种子 URL 列表，增加具体的数据源指引"
    
  - id: "P1-002"
    name: "Deliver 使用错误 Prompt"
    location: "task_builder.py:build_deliver_task"
    problem: "使用 architect.md 而非 designer.md，可能导致格式不匹配"
    fix: "改为使用 designer.md 或确认 architect.md 是否适合交付"
    
  - id: "P1-003"
    name: "Designer 输入依赖缺失"
    location: "task_builder.py:build_designer_task"
    problem: "未明确如何传递 research 输出到 Designer"
    fix: "在 design task 中明确列出需要读取的前置文件"

# =============================================================================
# 文件变更
# =============================================================================
files:
  modify:
    - path: "domains/solution/task_builder.py"
      changes:
        - "build_researcher_task: 修复文件名，使用 expert_id 参数"
        - "build_researcher_task: 注入 angle 和 reason 到 prompt"
        - "build_data_collection_task: 增加种子 URL 列表"
        - "build_designer_task: 明确列出前置输入文件"
        - "build_deliver_task: 确认使用正确的 prompt 文件"
        
    - path: "domains/solution/orchestrator_agent.py"
      changes:
        - "research 阶段: 传递 expert_id 和 expert 元数据"
        - "planning 阶段: 解析 required_experts 用于 research 阶段"

# =============================================================================
# 验证要求
# =============================================================================
validation:
  - "research task 文件名格式为 research_expert_{id}.json"
  - "research prompt 包含 expert angle 和 reason"
  - "data_collection task 包含种子 URL"
  - "design task 明确列出前置文件"
  - "deliver task 使用正确的 prompt"
  - "validate_refactor.py 仍然通过"
  - "可以本地 exec 运行验证"
