# DeepFlow Domain Contract - Investment
cage_version: "2.0"
domain: investment

# 接口契约
interface:
  input:
    schema:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          pattern: "^\\d{6}\\.(SH|SZ|BJ)$"
          example: "300604.SZ"
        name:
          type: string
          minLength: 2
          maxLength: 20
        price:
          type: number
          minimum: 0
          optional: true
    validation: "domains.investment.validator.validate_input"
  
  output:
    schema:
      type: object
      required: [status, pipeline_state, session_id, final_score]
      properties:
        status:
          type: string
          enum: [completed, failed]
        pipeline_state:
          type: string
          enum: [CONVERGED, MAX_ITERATIONS, FAILED, TIMEOUT]
        session_id:
          type: string
          pattern: "^[a-zA-Z0-9_]+_\\d{6}_[a-z]+_[a-f0-9]{8}$"
        final_score:
          type: number
          minimum: 0
          maximum: 1
        convergence_reason:
          type: string
        iterations:
          type: integer
          minimum: 1
    validation: "domains.investment.validator.validate_output"

# 行为契约
behavior:
  stages:
    count: 9
    required_order: [data_collection, search, planning, research, financial_analysis, audit, fix, verify, summarize]
    allow_skip: false
  
  workers:
    researcher:
      count: 6
      parallel: true
      max_concurrency: 3
      timeout: 300
    auditor:
      count: 3
      parallel: true
      max_concurrency: 3
      timeout: 180
    fixer:
      count: 1
      parallel: false
      timeout: 240
  
  convergence:
    min_iterations: 2
    max_iterations: 10
    target_score: 0.92
    stall_threshold: 0.02
    must_converge: true

# 异常契约
exceptions:
  circuit_breaker:
    trigger: "all_models_exhausted"
    action: "fail_pipeline"
    notify: true
  
  timeout:
    worker: 300
    stage: 600
    action: "retry_once_then_fail"
  
  validation_failure:
    input: "fail_fast"
    output: "retry_stage"

# 数据契约
data:
  blackboard:
    path: "blackboard/{session_id}/"
    required_files:
      - "data/INDEX.json"
      - "data/01_financials/key_metrics.json"
      - "stages/{stage_name}/output.json"
    schema_validation: true
  
  checkpoints:
    enabled: true
    interval: "per_stage"
    retention: "7d"

# 数据流契约（P0 修复：Worker → Blackboard → Orchestrator）
data_flow:
  worker_to_blackboard:
    direction: "write"
    path: "blackboard/{session_id}/stages/{role}_output.json"
    format: "json"
    required: true
  
  orchestrator_from_blackboard:
    direction: "read"
    path: "blackboard/{session_id}/stages/{role}_output.json"
    purpose: "quality_evaluation"
    required: true
